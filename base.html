<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="user-campus" content="{{ current_user.campus if current_user.is_authenticated else '' }}">
    <title>{% block title %}CPUT ShuttleTracker{% endblock %}</title>
    
    <!-- Global Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    
    <!-- Page-specific CSS -->
    {% block styles %}{% endblock %}
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚌</text></svg>">
</head>
<body>
    {% if current_user.is_authenticated %}
    <!-- Desktop Sidebar Navigation -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-bus"></i> ShuttleTracker
            </div>
            <div class="subtitle">CPUT Transport System</div>
        </div>
        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard') }}" class="sidebar-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a href="{{ url_for('routes') }}" class="sidebar-item {% if request.endpoint == 'routes' %}active{% endif %}">
                <i class="fas fa-route"></i> All Routes
            </a>
            <a href="{{ url_for('profile') }}" class="sidebar-item {% if request.endpoint == 'profile' %}active{% endif %}">
                <i class="fas fa-user"></i> My Profile
            </a>
            <a href="{{ url_for('logout') }}" class="sidebar-item">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </nav>
    </aside>
    
    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="{{ url_for('dashboard') }}" class="nav-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="{{ url_for('routes') }}" class="nav-item {% if request.endpoint == 'routes' %}active{% endif %}">
            <i class="fas fa-route"></i>
            <span>Routes</span>
        </a>
        <a href="{{ url_for('profile') }}" class="nav-item {% if request.endpoint == 'profile' %}active{% endif %}">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
        <a href="{{ url_for('logout') }}" class="nav-item">
            <i class="fas fa-sign-out-alt"></i>
            <span>Logout</span>
        </a>
    </nav>
    {% endif %}
    
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Core JavaScript -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    <!-- Page-specific JavaScript -->
    {% block scripts %}{% endblock %}
</body>
</html>
